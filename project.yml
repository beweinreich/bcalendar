name: BCalendar
options:
  bundleIdPrefix: com.bcalendar
  deploymentTarget:
    macOS: "15.0"
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
targets:
  BCalendar:
    type: application
    platform: macOS
    sources:
      - Sources
      - path: Resources
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/BCalendar.entitlements
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_BUNDLE_IDENTIFIER: com.bcalendar.app
        PRODUCT_NAME: BCalendar
    dependencies:
      - package: GRDB
      - sdk: Network.framework
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.24.0"
